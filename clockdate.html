<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relógio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

body{
    font-family:Helvetica, Arial, sans-serif;
    color:#373530;
}

.container{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.widget{
    width:100%;
    height:100%;
    padding:1% 1%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
}

.clock{
    font-family:'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif !important;
    font-weight:800;
    line-height:0.88;
    letter-spacing:0.02em;
    color:#373530;
    white-space:nowrap;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:nowrap;
    font-variant-numeric:tabular-nums;
    font-feature-settings:"tnum";
}

.time-part{
    display:inline-block;
    width:1.9ch;
    text-align:center;
}

.colon{
    display:inline-block;
    text-align:center;
    opacity:1;
    transition:opacity 0.2s ease;
}

.date{
    margin-top:6px;
    font-family:Helvetica, Arial, sans-serif;
    font-weight:600;
    line-height:1.05;
    color:#787774;
    text-wrap:balance;
    max-width:88%;
}
</style>
</head>

<body>
<div class="container">
    <div class="widget" id="widget">
        <div class="clock" id="clock">
            <span class="time-part" id="h">00</span>
            <span class="colon" id="c1">:</span>
            <span class="time-part" id="m">00</span>
            <span class="colon" id="c2">:</span>
            <span class="time-part" id="s">00</span>
        </div>
        <div class="date" id="date"></div>
    </div>
</div>

<script>
const widget = document.getElementById('widget');
const clock = document.getElementById('clock');
const dateEl = document.getElementById('date');

const elH = document.getElementById('h');
const elM = document.getElementById('m');
const elS = document.getElementById('s');
const elC1 = document.getElementById('c1');
const elC2 = document.getElementById('c2');

const diasSemana = [
    'domingo','segunda-feira','terça-feira','quarta-feira',
    'quinta-feira','sexta-feira','sábado'
];

const meses = [
    'janeiro','fevereiro','março','abril','maio','junho',
    'julho','agosto','setembro','outubro','novembro','dezembro'
];

function atualizarConteudo(){
    const agora = new Date();

    elH.textContent = String(agora.getHours()).padStart(2,'0');
    elM.textContent = String(agora.getMinutes()).padStart(2,'0');
    elS.textContent = String(agora.getSeconds()).padStart(2,'0');

    dateEl.textContent =
        `${diasSemana[agora.getDay()]}, ${agora.getDate()} de ${meses[agora.getMonth()]} de ${agora.getFullYear()}`;
}

function ajustarTamanho(){
    const baseClock = 48;
    const baseDate = 15;
    const minClock = 14;
    const minDate = 9;

    let clockSize = baseClock;
    let dateSize = baseDate;

    clock.style.fontSize = clockSize + 'px';
    dateEl.style.fontSize = dateSize + 'px';
    dateEl.style.marginTop = '6px';

    elC1.style.width = (clockSize * 0.34) + 'px';
    elC2.style.width = (clockSize * 0.34) + 'px';

    while(
        (
            clock.scrollWidth > widget.clientWidth * 0.92 ||
            dateEl.scrollWidth > widget.clientWidth * 0.88 ||
            (clock.scrollHeight + dateEl.scrollHeight + 6) > widget.clientHeight * 0.72
        ) &&
        clockSize > minClock
    ){
        clockSize -= 1;
        dateSize = Math.max(minDate, Math.round(clockSize * 0.31));

        clock.style.fontSize = clockSize + 'px';
        dateEl.style.fontSize = dateSize + 'px';

        elC1.style.width = (clockSize * 0.34) + 'px';
        elC2.style.width = (clockSize * 0.34) + 'px';
    }

    while(
        dateEl.scrollWidth > widget.clientWidth * 0.88 &&
        dateSize > minDate
    ){
        dateSize -= 1;
        dateEl.style.fontSize = dateSize + 'px';
    }
}

let colonOn = true;

setInterval(() => {
    colonOn = !colonOn;
    const op = colonOn ? '1' : '0';
    elC1.style.opacity = op;
    elC2.style.opacity = op;
}, 750);

function iniciarRelogioSincronizado(){
    atualizarConteudo();

    const agora = new Date();
    const espera = 1000 - agora.getMilliseconds();

    setTimeout(() => {
        atualizarConteudo();

        setInterval(() => {
            atualizarConteudo();
        }, 1000);

    }, espera);
}

new ResizeObserver(() => {
    ajustarTamanho();
}).observe(widget);

window.addEventListener('load', () => {
    atualizarConteudo();
    ajustarTamanho();
});

window.addEventListener('resize', ajustarTamanho);

iniciarRelogioSincronizado();
</script>
</body>
</html>
