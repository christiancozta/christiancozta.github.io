<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alternância diária — Correções</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --text:#373530;
  --muted:#787774;
  --muted-2:#9B9A97;
  --border:rgba(55,53,48,0.14);
  --border-strong:rgba(55,53,48,0.22);
  --bg-soft:rgba(55,53,48,0.04);

  --title-size:26px;
  --tab-size:14px;
  --label-size:13px;
  --button-size:14px;
  --pair-size:20px;
  --meta-size:12px;
  --code-size:18px;
  --team-code-size:13px;
  --team-name-size:12px;

  --radius:6px;
  --radius-group:7px;
  --control-height:40px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;}
body{font-family:Helvetica, Arial, sans-serif;color:var(--text);}

.container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.widget{
  width:100%;height:100%;padding:24px 28px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;position:relative;overflow:hidden;
}
.title{
  font-family:'Inter', system-ui, sans-serif;
  font-size:var(--title-size);
  font-weight:800;line-height:1;letter-spacing:.01em;white-space:nowrap;
}
.tabs{display:flex;}
.tab{
  appearance:none;border:1px solid var(--border);background:transparent;color:var(--muted);
  font-size:var(--tab-size);font-weight:600;height:36px;padding:0 14px;cursor:pointer;
  transition:background .15s ease, color .15s ease, transform .08s ease;
}
.tab:first-child{border-radius:var(--radius-group) 0 0 var(--radius-group);}
.tab:last-child{border-radius:0 var(--radius-group) var(--radius-group) 0;margin-left:-1px;}
.tab.active{background:var(--text);color:#fff;border-color:var(--text);}
.tab:hover:not(.active){background:rgba(55,53,48,0.05);color:var(--text);}

.panel{display:flex;flex-direction:column;align-items:center;width:100%;gap:14px;}
.panel[hidden]{display:none;}

.widget--horizontal .panel-main{width:min(100%, 720px);}
.widget--center .panel-main{width:min(100%, 620px);}
.widget--vertical .panel-main{width:min(100%, 320px);}

.field-row{display:flex;align-items:flex-end;justify-content:center;gap:12px;width:100%;flex-wrap:wrap;}
.widget--vertical .field-row{flex-direction:column;align-items:center;gap:10px;}
.widget--center .field-row{justify-content:center;}
.field{display:flex;flex-direction:column;gap:4px;}
.widget--vertical .field{width:min(100%, 260px);}
.field-label{font-size:var(--label-size);font-weight:600;color:var(--muted-2);line-height:1.1;}
.field input{
  height:var(--control-height);padding:0 12px;border:1px solid var(--border);border-radius:var(--radius);
  outline:none;font-size:14px;color:var(--text);background:transparent;
  transition:border-color .15s ease, background .15s ease;
}
.field input:focus{border-color:var(--border-strong);background:rgba(55,53,48,0.02);}
input[type="date"]{width:152px;}
.widget--vertical input[type="date"]{width:100%;}

.action-btn{
  appearance:none;height:var(--control-height);padding:0 14px;border:1px solid var(--border);border-radius:var(--radius);
  background:transparent;color:var(--muted);font-size:var(--button-size);font-weight:600;cursor:pointer;
  transition:background .15s ease, color .15s ease, transform .08s ease;
}
.action-btn:hover{background:rgba(55,53,48,0.05);color:var(--text);}
.action-btn:active{transform:scale(.98);}
.widget--vertical .action-btn{width:min(100%, 260px);}

.result-card{
  width:min(100%, 720px);display:flex;flex-direction:column;gap:12px;
  border-left:2px solid var(--text);padding:10px 12px;
}
.meta{
  display:flex;flex-wrap:wrap;gap:8px 12px;align-items:center;justify-content:flex-start;
  font-size:var(--meta-size);color:var(--muted);
}
.meta strong{font-family:'Inter', system-ui, sans-serif;font-weight:800;color:var(--text);}
.pairs{
  display:flex;flex-direction:column;gap:10px;width:100%;
}
.pair{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  font-family:'Inter', system-ui, sans-serif;font-size:var(--pair-size);font-weight:800;letter-spacing:.01em;
}
.sep{color:var(--muted);font-weight:700;}
.empty-state{
  font-size:13px;color:var(--muted);line-height:1.4;
}

.code-pill{
  position:relative;display:inline-flex;align-items:center;justify-content:center;
  min-height:34px;padding:0 12px;border:1px solid var(--border);border-radius:999px;
  background:transparent;color:var(--text);font-size:var(--code-size);font-weight:800;line-height:1;
  cursor:default;white-space:nowrap;
}
.code-pill:hover{background:rgba(55,53,48,0.04);}
.code-pill::after{
  content:attr(data-name);
  position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%) translateY(4px);
  background:#2f2f2f;color:#fff;padding:6px 8px;border-radius:6px;
  font-size:12px;font-weight:600;line-height:1.2;white-space:nowrap;pointer-events:none;
  opacity:0;visibility:hidden;transition:opacity .14s ease, transform .14s ease, visibility .14s ease;
  z-index:30;box-shadow:0 8px 20px rgba(0,0,0,.18);
}
.code-pill::before{
  content:"";position:absolute;left:50%;bottom:calc(100% + 3px);transform:translateX(-50%);
  border:5px solid transparent;border-top-color:#2f2f2f;opacity:0;visibility:hidden;transition:opacity .14s ease, visibility .14s ease;
  z-index:29;
}
.code-pill:hover::after,.code-pill:hover::before{opacity:1;visibility:visible;}
.code-pill:hover::after{transform:translateX(-50%) translateY(0);}

.week-grid{display:flex;flex-direction:column;gap:12px;width:100%;}
.week-day{display:flex;flex-direction:column;gap:8px;padding-top:2px;}
.week-day + .week-day{border-top:1px solid rgba(55,53,48,0.08);padding-top:12px;}
.day-title{
  font-family:'Inter', system-ui, sans-serif;font-size:14px;font-weight:800;color:var(--text);
}
.day-sub{font-size:12px;color:var(--muted);margin-left:6px;font-weight:600;}

.team-grid{
  width:min(100%, 760px);display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:14px;
}
.widget--vertical .team-grid{grid-template-columns:1fr;width:min(100%, 320px);}
.team-card{
  border:1px solid var(--border);border-radius:10px;padding:12px 12px 10px;background:transparent;
  display:flex;flex-direction:column;gap:10px;
}
.team-card-title{
  font-family:'Inter', system-ui, sans-serif;font-size:14px;font-weight:800;color:var(--text);
}
.team-list{display:flex;flex-direction:column;gap:8px;}
.person-row{
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:6px 0;
  border-top:1px solid rgba(55,53,48,0.06);
}
.person-row:first-child{border-top:none;padding-top:0;}
.person-main{min-width:0;display:flex;flex-direction:column;gap:2px;}
.person-code{
  font-family:'Inter', system-ui, sans-serif;font-size:var(--team-code-size);font-weight:800;color:var(--text);
  line-height:1.1;
}
.person-name{font-size:var(--team-name-size);color:var(--muted);line-height:1.25;word-break:break-word;}
.switch{
  appearance:none;border:1px solid var(--border);background:transparent;color:var(--muted);
  min-width:64px;height:30px;padding:0 10px;border-radius:999px;font-size:11px;font-weight:700;cursor:pointer;
  transition:background .15s ease, color .15s ease, border-color .15s ease;
}
.switch:hover{background:rgba(55,53,48,0.05);color:var(--text);}
.switch.off{background:rgba(55,53,48,0.08);color:var(--muted);}

.footer-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;width:100%;}

.layout-switch{
  position:absolute;right:10px;bottom:10px;display:flex;align-items:center;gap:2px;padding:3px;
  border:1px solid rgba(55,53,48,0.08);border-radius:999px;background:rgba(255,255,255,0.62);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:20;pointer-events:auto;
}
.layout-btn{
  appearance:none;width:18px;height:18px;border:none;background:transparent;color:var(--muted);border-radius:999px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.68;
  transition:background .15s ease, opacity .15s ease, transform .08s ease;padding:0;pointer-events:auto;
}
.layout-btn:hover{background:rgba(55,53,48,0.05);opacity:1;}
.layout-btn.active{background:rgba(55,53,48,0.10);opacity:1;}
.layout-btn:active{transform:scale(.95);}
.dots{display:flex;align-items:center;justify-content:center;}
.dots span{width:3px;height:3px;border-radius:999px;background:currentColor;display:block;}
.dots--row{flex-direction:row;gap:2px;}
.dots--center{flex-direction:row;}
.dots--column{flex-direction:column;gap:2px;}

@media (max-width: 760px), (max-height: 520px){
  :root{
    --title-size:24px;
    --pair-size:18px;
    --code-size:16px;
    --team-code-size:12px;
  }
  .widget{padding:18px;gap:14px;}
  .result-card{gap:10px;}
}

@media (max-width: 480px){
  :root{
    --title-size:22px;
    --pair-size:17px;
    --code-size:15px;
  }
  .code-pill{min-height:31px;padding:0 10px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="widget widget--horizontal" id="widget">
    <div class="title">Alternância</div>

    <div class="tabs">
      <button class="tab active" id="tab-diario" type="button">Diário</button>
      <button class="tab" id="tab-semanal" type="button">Semanal</button>
      <button class="tab" id="tab-equipe" type="button">Equipe</button>
    </div>

    <div class="panel panel-main" id="panel-diario">
      <div class="field-row">
        <button class="action-btn" id="btn-prev" type="button">←</button>
        <div class="field">
          <span class="field-label">Data</span>
          <input type="date" id="view-date">
        </div>
        <button class="action-btn" id="btn-hoje" type="button">Hoje</button>
        <button class="action-btn" id="btn-next" type="button">→</button>
      </div>
      <div class="result-card" id="daily-card"></div>
    </div>

    <div class="panel panel-main" id="panel-semanal" hidden>
      <div class="field-row">
        <div class="field">
          <span class="field-label">Semana de</span>
          <input type="date" id="week-date">
        </div>
        <button class="action-btn" id="btn-week-prev" type="button">← Semana</button>
        <button class="action-btn" id="btn-week-hoje" type="button">Atual</button>
        <button class="action-btn" id="btn-week-next" type="button">Semana →</button>
      </div>
      <div class="result-card" id="weekly-card"></div>
    </div>

    <div class="panel panel-main" id="panel-equipe" hidden>
      <div class="team-grid">
        <div class="team-card">
          <div class="team-card-title">Estagiários</div>
          <div class="team-list" id="estag-list"></div>
        </div>
        <div class="team-card">
          <div class="team-card-title">Assessores</div>
          <div class="team-list" id="ass-list"></div>
        </div>
      </div>
      <div class="footer-actions">
        <button class="action-btn" id="btn-reactivar" type="button">Reativar todos</button>
      </div>
    </div>

    <div class="layout-switch" aria-label="Alternar orientação do layout">
      <button class="layout-btn active" id="btn-layout-horizontal" type="button" title="Modo horizontal">
        <span class="dots dots--row"><span></span><span></span><span></span></span>
      </button>
      <button class="layout-btn" id="btn-layout-center" type="button" title="Modo centralizado">
        <span class="dots dots--center"><span></span></span>
      </button>
      <button class="layout-btn" id="btn-layout-vertical" type="button" title="Modo vertical">
        <span class="dots dots--column"><span></span><span></span><span></span></span>
      </button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'alternancia-correcao-v3';
const DATA_BASE = '2026-04-08';

const FERIADOS = {
  "2025-01-01":"Confraternização Universal",
  "2025-01-02":"Recesso","2025-01-03":"Recesso","2025-01-06":"Recesso",
  "2025-01-07":"Suspensão de prazos","2025-01-08":"Suspensão de prazos",
  "2025-01-09":"Suspensão de prazos","2025-01-10":"Suspensão de prazos",
  "2025-01-13":"Suspensão de prazos","2025-01-14":"Suspensão de prazos",
  "2025-01-15":"Suspensão de prazos","2025-01-16":"Suspensão de prazos",
  "2025-01-17":"Suspensão de prazos","2025-01-20":"Suspensão de prazos",
  "2025-03-03":"Véspera de Carnaval","2025-03-04":"Carnaval",
  "2025-04-17":"Quinta-feira Santa","2025-04-18":"Paixão de Cristo","2025-04-21":"Tiradentes",
  "2025-05-01":"Dia do Trabalho","2025-05-02":"Suspensão do expediente",
  "2025-06-19":"Corpus Christi","2025-06-20":"Suspensão",
  "2025-09-08":"Padroeira de Curitiba",
  "2025-10-27":"Suspensão do expediente","2025-10-28":"Dia do Funcionário Público",
  "2025-11-20":"Consciência Negra","2025-11-21":"Suspensão do expediente",
  "2025-12-18":"Dia da Justiça","2025-12-19":"Emancipação Política do Paraná",
  "2025-12-22":"Recesso","2025-12-23":"Recesso","2025-12-24":"Véspera de Natal",
  "2025-12-25":"Natal","2025-12-26":"Recesso",
  "2025-12-29":"Recesso","2025-12-30":"Recesso","2025-12-31":"Véspera de Ano Novo",
  "2026-01-01":"Confraternização Universal",
  "2026-01-02":"Recesso","2026-01-05":"Recesso","2026-01-06":"Recesso",
  "2026-01-07":"Suspensão de prazos","2026-01-08":"Suspensão de prazos",
  "2026-01-09":"Suspensão de prazos","2026-01-12":"Suspensão de prazos",
  "2026-01-13":"Suspensão de prazos","2026-01-14":"Suspensão de prazos",
  "2026-01-15":"Suspensão de prazos","2026-01-16":"Suspensão de prazos",
  "2026-01-19":"Suspensão de prazos","2026-01-20":"Suspensão de prazos",
  "2026-02-16":"Véspera de Carnaval","2026-02-17":"Carnaval",
  "2026-04-02":"Quinta-feira Santa","2026-04-03":"Paixão de Cristo",
  "2026-04-20":"Suspensão de Expediente","2026-04-21":"Tiradentes",
  "2026-05-01":"Dia do Trabalho",
  "2026-06-04":"Corpus Christi","2026-06-05":"Suspensão de Expediente",
  "2026-09-07":"Independência do Brasil","2026-09-08":"Padroeira de Curitiba",
  "2026-10-12":"Nossa Senhora Aparecida","2026-10-30":"Dia do Funcionário Público",
  "2026-11-02":"Finados","2026-11-20":"Consciência Negra",
  "2026-12-18":"Dia da Justiça","2026-12-24":"Véspera de Natal",
  "2026-12-25":"Natal","2026-12-31":"Véspera de Ano Novo"
};

const WEEKDAYS = ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"];
const MONTHS = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

const baseEstagiarios = [
  { codigo: 'C293644AR', nome: 'Caroline Bochnia de Oliveira', ativo: false },
  { codigo: 'L286995UC', nome: 'Lucas Roberto Kravetz', ativo: true },
  { codigo: 'T301291AM', nome: 'Tamiris Blaschek da Cunha', ativo: true }
];

const baseAssessores = [
  { codigo: 'C20855HR', nome: 'Christian da Costa', ativo: true },
  { codigo: 'I294175SA', nome: 'Isabella de Oliveira Goncalves', ativo: true },
  { codigo: 'L291265UA', nome: 'Luara da Costa Monteiro', ativo: true },
  { codigo: 'L291897UI', nome: 'Luiza Calliari', ativo: false },
  { codigo: 'S13679HE', nome: 'Sheila Doroty Miranda Ribeiro', ativo: false }
];

const state = loadState();
const widget = document.getElementById('widget');

function clonePeople(list){
  return list.map(p => ({...p}));
}

function loadState(){
  const defaults = {
    tab: 'diario',
    layout: 'horizontal',
    viewDate: normalizeToUseful(new Date()),
    weekDate: normalizeToUseful(new Date()),
    estagiarios: clonePeople(baseEstagiarios),
    assessores: clonePeople(baseAssessores)
  };

  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaults;
    const saved = JSON.parse(raw);

    return {
      ...defaults,
      ...saved,
      estagiarios: mergeSaved(baseEstagiarios, saved.estagiarios),
      assessores: mergeSaved(baseAssessores, saved.assessores),
      viewDate: normalizeToUseful(saved.viewDate || defaults.viewDate),
      weekDate: normalizeToUseful(saved.weekDate || defaults.weekDate)
    };
  }catch(e){
    return defaults;
  }
}

function mergeSaved(base, saved){
  if(!Array.isArray(saved)) return clonePeople(base);
  const map = new Map(saved.map(p => [p.codigo, p]));
  return base.map(p => ({...p, ...(map.get(p.codigo) || {})}));
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function toISO(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseISO(iso){
  return new Date(iso + 'T12:00:00');
}

function fmtBR(iso){
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function fmtLong(iso){
  const d = parseISO(iso);
  return `${d.getDate()} de ${MONTHS[d.getMonth()]} de ${d.getFullYear()}`;
}

function weekdayName(iso){
  return WEEKDAYS[parseISO(iso).getDay()];
}

function isWeekend(iso){
  const day = parseISO(iso).getDay();
  return day === 0 || day === 6;
}

function isHoliday(iso){
  return Boolean(FERIADOS[iso]);
}

function isUsefulDay(iso){
  return !isWeekend(iso) && !isHoliday(iso);
}

function normalizeToUseful(value){
  let iso = typeof value === 'string' ? value : toISO(value);
  let d = parseISO(iso);
  let guard = 0;
  while(!isUsefulDay(toISO(d)) && guard < 400){
    d.setDate(d.getDate() + 1);
    guard++;
  }
  return toISO(d);
}

function addDays(iso, amount){
  const d = parseISO(iso);
  d.setDate(d.getDate() + amount);
  return toISO(d);
}

function moveUsefulDays(iso, step){
  if(step === 0) return normalizeToUseful(iso);
  let d = parseISO(iso);
  let remaining = Math.abs(step);
  const dir = step > 0 ? 1 : -1;
  let guard = 0;
  while(remaining > 0 && guard < 1000){
    d.setDate(d.getDate() + dir);
    if(isUsefulDay(toISO(d))) remaining--;
    guard++;
  }
  return toISO(d);
}

function countUsefulSteps(baseIso, targetIso){
  if(baseIso === targetIso) return 0;
  let count = 0;
  if(baseIso < targetIso){
    let d = parseISO(baseIso);
    let guard = 0;
    while(toISO(d) < targetIso && guard < 2000){
      d.setDate(d.getDate() + 1);
      if(isUsefulDay(toISO(d))) count++;
      guard++;
    }
    return count;
  }
  let d = parseISO(baseIso);
  let guard = 0;
  while(toISO(d) > targetIso && guard < 2000){
    d.setDate(d.getDate() - 1);
    if(isUsefulDay(toISO(d))) count--;
    guard++;
  }
  return count;
}

function getActive(list){
  return list.filter(p => p.ativo);
}

function rotate(list, steps){
  if(!list.length) return [];
  const size = list.length;
  const offset = ((steps % size) + size) % size;
  return list.map((_, index) => list[(index + offset) % size]);
}

function getScaleForDate(iso){
  const estags = getActive(state.estagiarios);
  const assessores = getActive(state.assessores).sort((a,b) => a.nome.localeCompare(b.nome, 'pt-BR'));

  if(!estags.length || !assessores.length){
    return { date: iso, pairs: [], estagsCount: estags.length, assessoresCount: assessores.length };
  }

  const usefulIso = normalizeToUseful(iso);
  const steps = countUsefulSteps(DATA_BASE, usefulIso);
  const rot = rotate(assessores, steps);
  const pairs = estags.map((estag, index) => ({
    estag,
    assessor: rot[index % rot.length]
  }));

  return { date: usefulIso, pairs, estagsCount: estags.length, assessoresCount: assessores.length };
}

function getWeekDates(anchorIso){
  const anchor = parseISO(normalizeToUseful(anchorIso));
  const day = anchor.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(anchor);
  monday.setDate(anchor.getDate() + diffToMonday);

  const days = [];
  for(let i=0;i<5;i++){
    const iso = toISO(new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i, 12));
    days.push(iso);
  }
  return days.filter(isUsefulDay);
}

function codePill(person){
  return `<span class="code-pill" data-name="${escapeHtml(person.nome)}">${escapeHtml(person.codigo)}</span>`;
}

function renderDaily(){
  const info = getScaleForDate(state.viewDate);
  const holiday = FERIADOS[info.date];
  const card = document.getElementById('daily-card');

  const meta = `
    <div class="meta">
      <span><strong>${fmtBR(info.date)}</strong> — ${weekdayName(info.date)}</span>
      <span>${fmtLong(info.date)}</span>
      ${holiday ? `<span>${escapeHtml(holiday)}</span>` : ''}
    </div>`;

  let body = '';
  if(!info.estagsCount && !info.assessoresCount){
    body = '<div class="empty-state">Nenhum integrante ativo no momento.</div>';
  }else if(!info.estagsCount){
    body = '<div class="empty-state">Nenhum estagiário ativo.</div>';
  }else if(!info.assessoresCount){
    body = '<div class="empty-state">Nenhum assessor ativo.</div>';
  }else{
    body = `<div class="pairs">${info.pairs.map(pair => `
      <div class="pair">
        ${codePill(pair.estag)}
        <span class="sep">—</span>
        ${codePill(pair.assessor)}
      </div>`).join('')}</div>`;
  }

  card.innerHTML = meta + body;
  document.getElementById('view-date').value = info.date;
}

function renderWeekly(){
  const dates = getWeekDates(state.weekDate);
  const card = document.getElementById('weekly-card');

  if(!dates.length){
    card.innerHTML = '<div class="empty-state">Nenhum dia útil disponível nesta semana.</div>';
    return;
  }

  const grid = dates.map(iso => {
    const info = getScaleForDate(iso);
    const pairs = info.pairs.length ? info.pairs.map(pair => `
      <div class="pair">
        ${codePill(pair.estag)}
        <span class="sep">—</span>
        ${codePill(pair.assessor)}
      </div>`).join('') : '<div class="empty-state">Escala indisponível.</div>';

    return `
      <div class="week-day">
        <div class="day-title">${capitalize(weekdayName(info.date))}<span class="day-sub">${fmtBR(info.date)}</span></div>
        <div class="pairs">${pairs}</div>
      </div>`;
  }).join('');

  card.innerHTML = `<div class="week-grid">${grid}</div>`;
  document.getElementById('week-date').value = dates[0];
}

function renderTeam(){
  document.getElementById('estag-list').innerHTML = renderTeamRows(state.estagiarios, 'estagiario');
  document.getElementById('ass-list').innerHTML = renderTeamRows(state.assessores, 'assessor');

  document.querySelectorAll('[data-role][data-code]').forEach(btn => {
    btn.addEventListener('click', () => togglePerson(btn.dataset.role, btn.dataset.code));
  });
}

function renderTeamRows(list, role){
  return list.map(person => `
    <div class="person-row">
      <div class="person-main">
        <div class="person-code">${escapeHtml(person.codigo)}</div>
        <div class="person-name">${escapeHtml(person.nome)}</div>
      </div>
      <button class="switch ${person.ativo ? '' : 'off'}" data-role="${role}" data-code="${escapeHtml(person.codigo)}" type="button">
        ${person.ativo ? 'ativo' : 'fora'}
      </button>
    </div>`).join('');
}

function togglePerson(role, code){
  const list = role === 'estagiario' ? state.estagiarios : state.assessores;
  const person = list.find(p => p.codigo === code);
  if(!person) return;
  person.ativo = !person.ativo;
  saveState();
  renderAll();
}

function setTab(tab){
  state.tab = tab;
  saveState();

  document.getElementById('tab-diario').classList.toggle('active', tab === 'diario');
  document.getElementById('tab-semanal').classList.toggle('active', tab === 'semanal');
  document.getElementById('tab-equipe').classList.toggle('active', tab === 'equipe');

  document.getElementById('panel-diario').hidden = tab !== 'diario';
  document.getElementById('panel-semanal').hidden = tab !== 'semanal';
  document.getElementById('panel-equipe').hidden = tab !== 'equipe';
}

function setLayout(mode){
  state.layout = mode;
  saveState();
  widget.classList.remove('widget--horizontal','widget--center','widget--vertical');
  widget.classList.add(`widget--${mode}`);
  document.getElementById('btn-layout-horizontal').classList.toggle('active', mode === 'horizontal');
  document.getElementById('btn-layout-center').classList.toggle('active', mode === 'center');
  document.getElementById('btn-layout-vertical').classList.toggle('active', mode === 'vertical');
}

function reactivateAll(){
  state.estagiarios.forEach(p => p.ativo = true);
  state.assessores.forEach(p => p.ativo = true);
  saveState();
  renderAll();
}

function renderAll(){
  setTab(state.tab);
  setLayout(state.layout);
  renderDaily();
  renderWeekly();
  renderTeam();
}

function capitalize(str){
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function escapeHtml(value){
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

document.getElementById('tab-diario').addEventListener('click', () => setTab('diario'));
document.getElementById('tab-semanal').addEventListener('click', () => setTab('semanal'));
document.getElementById('tab-equipe').addEventListener('click', () => setTab('equipe'));

document.getElementById('btn-layout-horizontal').addEventListener('click', () => setLayout('horizontal'));
document.getElementById('btn-layout-center').addEventListener('click', () => setLayout('center'));
document.getElementById('btn-layout-vertical').addEventListener('click', () => setLayout('vertical'));

document.getElementById('view-date').addEventListener('change', (e) => {
  state.viewDate = normalizeToUseful(e.target.value);
  saveState();
  renderDaily();
});

document.getElementById('week-date').addEventListener('change', (e) => {
  state.weekDate = normalizeToUseful(e.target.value);
  saveState();
  renderWeekly();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  state.viewDate = moveUsefulDays(state.viewDate, -1);
  saveState();
  renderDaily();
});

document.getElementById('btn-next').addEventListener('click', () => {
  state.viewDate = moveUsefulDays(state.viewDate, 1);
  saveState();
  renderDaily();
});

document.getElementById('btn-hoje').addEventListener('click', () => {
  state.viewDate = normalizeToUseful(new Date());
  saveState();
  renderDaily();
});

document.getElementById('btn-week-prev').addEventListener('click', () => {
  state.weekDate = addDays(getWeekDates(state.weekDate)[0] || state.weekDate, -7);
  state.weekDate = normalizeToUseful(state.weekDate);
  saveState();
  renderWeekly();
});

document.getElementById('btn-week-next').addEventListener('click', () => {
  state.weekDate = addDays(getWeekDates(state.weekDate)[0] || state.weekDate, 7);
  state.weekDate = normalizeToUseful(state.weekDate);
  saveState();
  renderWeekly();
});

document.getElementById('btn-week-hoje').addEventListener('click', () => {
  state.weekDate = normalizeToUseful(new Date());
  saveState();
  renderWeekly();
});

document.getElementById('btn-reactivar').addEventListener('click', reactivateAll);

renderAll();
</script>
</body>
</html>
