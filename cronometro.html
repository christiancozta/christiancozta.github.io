<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cronômetro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

body{
    font-family:Helvetica, Arial, sans-serif;
    color:#373530;
}

.container{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.widget{
    width:100%;
    height:100%;
    padding:1%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    border-radius:16px;
}

/* 🔥 TÍTULO ESTILO NOTION */
.title{
    font-family:'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-weight:800;
    line-height:1.1;
    letter-spacing:-0.02em;
    color:#373530;
    white-space:nowrap;
    max-width:94%;
}

/* 🔥 CRONÔMETRO */
.timer{
    font-family:Helvetica, Arial, sans-serif;
    font-weight:400;
    line-height:1.5;
    letter-spacing:0.02em;
    color:#787774;
    display:flex;
    align-items:center;
    justify-content:center;
    font-variant-numeric:tabular-nums;
}

/* números */
.time-part{
    width:2.2ch;
    text-align:center;
}

.colon{
    width:0.34em;
}

/* 🔥 BOTÕES */
.controls{
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:1px solid rgba(55,53,48,0.15);
    background:transparent;
    color:#787774;
    font-family:Helvetica, Arial, sans-serif;
    font-weight:600;
    border-radius:10px;
    cursor:pointer;
    transition:all 0.15s ease;
}

button:hover{
    background:rgba(55,53,48,0.05);
    color:#373530;
}

button:active{
    transform:scale(0.98);
}
</style>
</head>

<body>
<div class="container">
    <div class="widget" id="widget">

        <div class="title" id="title">Cronômetro</div>

        <div class="timer" id="timer">
            <span class="time-part" id="h">00</span>
            <span class="colon">:</span>
            <span class="time-part" id="m">00</span>
            <span class="colon">:</span>
            <span class="time-part" id="s">00</span>
        </div>

        <div class="controls" id="controls">
            <button id="startPause">Iniciar</button>
            <button id="reset">Zerar</button>
        </div>

    </div>
</div>

<script>
const widget = document.getElementById('widget');
const titleEl = document.getElementById('title');
const timerEl = document.getElementById('timer');
const controlsEl = document.getElementById('controls');

const elH = document.getElementById('h');
const elM = document.getElementById('m');
const elS = document.getElementById('s');

const startPauseBtn = document.getElementById('startPause');
const resetBtn = document.getElementById('reset');

let startTime = 0;
let elapsedTime = 0;
let timerInterval = null;
let running = false;

function formatarTempo(ms){
    const totalSeconds = Math.floor(ms / 1000);
    elH.textContent = String(Math.floor(totalSeconds / 3600)).padStart(2,'0');
    elM.textContent = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2,'0');
    elS.textContent = String(totalSeconds % 60).padStart(2,'0');
}

function atualizar(){
    const atual = Date.now() - startTime + elapsedTime;
    formatarTempo(atual);
}

function iniciar(){
    startTime = Date.now();
    timerInterval = setInterval(atualizar, 100);
    running = true;
    startPauseBtn.textContent = 'Pausar';
}

function pausar(){
    elapsedTime += Date.now() - startTime;
    clearInterval(timerInterval);
    running = false;
    startPauseBtn.textContent = 'Iniciar';
}

function zerar(){
    clearInterval(timerInterval);
    startTime = 0;
    elapsedTime = 0;
    running = false;
    formatarTempo(0);
    startPauseBtn.textContent = 'Iniciar';
}

startPauseBtn.onclick = () => running ? pausar() : iniciar();
resetBtn.onclick = zerar;

/* 🔥 RESPONSIVO AJUSTADO */
function ajustarTamanho(){
    const w = widget.clientWidth;
    const h = widget.clientHeight;

    if(!w || !h) return;

    /* título estilo Notion */
    const titleSize = Math.max(22, Math.min(w * 0.22, 64));
    titleEl.style.fontSize = titleSize + 'px';

    /* cronômetro */
    const timerSize = Math.max(18, Math.min(w * 0.12, 96));
    timerEl.style.fontSize = timerSize + 'px';

    /* botões */
    const buttonSize = Math.max(11, Math.min(w * 0.045, 15));
    const py = Math.max(6, Math.min(w * 0.02, 10));
    const px = Math.max(10, Math.min(w * 0.03, 14));

    document.querySelectorAll('button').forEach(btn=>{
        btn.style.fontSize = buttonSize + 'px';
        btn.style.padding = `${py}px ${px}px`;
    });

    /* espaçamento refinado */
    const gapTop = Math.max(10, Math.min(w * 0.03, 18));
    const gapControls = Math.max(12, Math.min(w * 0.04, 22));

    timerEl.style.marginTop = gapTop + 'px';
    controlsEl.style.marginTop = gapControls + 'px';
}

new ResizeObserver(ajustarTamanho).observe(widget);

window.onload = ()=>{
    formatarTempo(0);
    ajustarTamanho();
};

window.onresize = ajustarTamanho;
</script>
</body>
</html>
