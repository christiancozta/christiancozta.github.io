<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      background:transparent;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .gallery{
      position:relative;
      width:100%;
      aspect-ratio:1 / 1;
      overflow:hidden;
      background:transparent;
    }

    .slide{
      position:absolute;
      inset:0;
      opacity:0;
      transition:opacity .4s ease;
      pointer-events:none;
    }

    .slide.active{
      opacity:1;
      pointer-events:auto;
    }

    .slide img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      user-select:none;
      -webkit-user-drag:none;
    }

    .nav{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:38px;
      height:38px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      color:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:background .2s ease, opacity .2s ease, transform .2s ease;
      opacity:.65;
      z-index:5;
    }

    .nav:hover{
      opacity:1;
      background:rgba(255,255,255,.28);
    }

    .nav:active{
      transform:translateY(-50%) scale(.97);
    }

    .nav.prev{
      left:10px;
    }

    .nav.next{
      right:10px;
    }

    .nav svg{
      width:18px;
      height:18px;
      display:block;
    }

    .dots{
      position:absolute;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      display:flex;
      gap:7px;
      z-index:5;
    }

    .dot{
      width:7px;
      height:7px;
      border-radius:999px;
      background:rgba(255,255,255,.45);
      transition:transform .2s ease, background .2s ease;
    }

    .dot.active{
      background:rgba(255,255,255,.95);
      transform:scale(1.15);
    }

    @media (max-width:640px){
      .nav{
        width:34px;
        height:34px;
      }

      .nav.prev{
        left:8px;
      }

      .nav.next{
        right:8px;
      }

      .dots{
        bottom:8px;
      }
    }
  </style>
</head>
<body>
  <div class="gallery" id="gallery">
    <button class="nav prev" id="prevBtn" aria-label="Imagem anterior">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M14.5 5L8 12L14.5 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="nav next" id="nextBtn" aria-label="Próxima imagem">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M9.5 5L16 12L9.5 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="dots" id="dots"></div>
  </div>

  <script>
    const images = [
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426113/1_lpmhtq.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426113/3_lrxuk1.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426114/6_ma2v8y.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426113/2_tnmy6o.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426113/4_qk7trd.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426113/7_jfpoqo.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426113/4_qk7trd.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426114/8_usmpzz.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426114/5_tguzrr.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426114/10_jrmg3h.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426118/13_sik24i.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426119/14_b1cw3e.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426114/9_ew39er.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426119/14_b1cw3e.png",
      "https://res.cloudinary.com/dxhnb6ehy/image/upload/v1774426119/15_nbes7q.png"
      "
    ];

    const gallery = document.getElementById("gallery");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const dotsWrap = document.getElementById("dots");

    let current = 0;
    let timer = null;
    const intervalMs = 3000;

    function createSlides() {
      images.forEach((src, index) => {
        const slide = document.createElement("div");
        slide.className = "slide" + (index === 0 ? " active" : "");

        const img = document.createElement("img");
        img.src = src;
        img.alt = `Imagem ${index + 1}`;
        img.loading = index === 0 ? "eager" : "lazy";
        img.decoding = "async";

        slide.appendChild(img);
        gallery.insertBefore(slide, dotsWrap);

        const dot = document.createElement("div");
        dot.className = "dot" + (index === 0 ? " active" : "");
        dot.addEventListener("click", () => {
          goTo(index);
          restartAuto();
        });
        dotsWrap.appendChild(dot);
      });
    }

    function getSlides() {
      return Array.from(document.querySelectorAll(".slide"));
    }

    function getDots() {
      return Array.from(document.querySelectorAll(".dot"));
    }

    function updateUI() {
      const slides = getSlides();
      const dots = getDots();

      slides.forEach((slide, index) => {
        slide.classList.toggle("active", index === current);
      });

      dots.forEach((dot, index) => {
        dot.classList.toggle("active", index === current);
      });
    }

    function goTo(index) {
      current = (index + images.length) % images.length;
      updateUI();
    }

    function next() {
      goTo(current + 1);
    }

    function prev() {
      goTo(current - 1);
    }

    function startAuto() {
      if (images.length <= 1) return;
      stopAuto();
      timer = setInterval(next, intervalMs);
    }

    function stopAuto() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function restartAuto() {
      stopAuto();
      startAuto();
    }

    prevBtn.addEventListener("click", () => {
      prev();
      restartAuto();
    });

    nextBtn.addEventListener("click", () => {
      next();
      restartAuto();
    });

    gallery.addEventListener("mouseenter", stopAuto);
    gallery.addEventListener("mouseleave", startAuto);
    gallery.addEventListener("touchstart", stopAuto, { passive:true });
    gallery.addEventListener("touchend", startAuto, { passive:true });

    createSlides();
    startAuto();
  </script>
</body>
</html>
