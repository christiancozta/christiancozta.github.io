<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tempestividade</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;}

body{
    font-family:Helvetica, Arial, sans-serif;
    color:#373530;
}

.container{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.widget{
    width:100%;
    height:100%;
    padding:4%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* 🔥 TÍTULO NOTION */
.title{
    font-family:'Inter', system-ui;
    font-weight:800;
    letter-spacing:-0.02em;
    line-height:1.1;
}

/* 🔥 ABAS */
.tabs{
    display:flex;
    justify-content:center;
    margin-bottom:32px;
}

.tab{
    border:1px solid rgba(55,53,48,0.15);
    background:transparent;
    color:#787774;
    font-weight:600;
    cursor:pointer;
    padding:7px 14px;
}

.tab:first-child{border-radius:8px 0 0 8px;}
.tab:last-child{border-radius:0 8px 8px 0;margin-left:-1px;}

.tab.active{
    background:#373530;
    color:#fff;
}

/* 🔥 LINHA CENTRAL */
.field-row{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:24px;
    flex-wrap:wrap;
    margin-bottom:24px;
}

/* 🔥 CAMPOS */
.field{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.field-label{
    font-weight:600;
    color:#9B9A97;
    margin-bottom:6px;
}

.field input{
    border:1px solid rgba(55,53,48,0.18);
    border-radius:8px;
    padding:7px 10px;
    text-align:center;
}

/* 🔥 BOTÃO */
.calc-btn{
    border:1px solid rgba(55,53,48,0.15);
    background:transparent;
    color:#787774;
    font-weight:600;
    border-radius:8px;
    padding:7px 14px;
    cursor:pointer;
}

.calc-btn:hover{
    background:rgba(55,53,48,0.05);
    color:#373530;
}

/* 🔥 RESULTADO */
.result{
    display:none;
    width:100%;
    text-align:center;
    margin-top:10px;
}

.result.show{display:block;}

.result strong{
    font-family:'Inter';
    font-weight:800;
}

.result .sub{
    display:block;
    color:#787774;
    margin-top:4px;
}
</style>
</head>

<body>
<div class="container">
<div class="widget" id="widget">

<div class="title" id="title">Tempestividade</div>

<div class="tabs">
<button class="tab active" id="tab-prazo">Calcular prazo</button>
<button class="tab" id="tab-contar">Contar dias</button>
</div>

<!-- PRAZO -->
<div id="panel-prazo">
<div class="field-row">
<div class="field">
<span class="field-label">Início</span>
<input type="date" id="p-start">
</div>

<div class="field">
<span class="field-label">Dias úteis</span>
<input type="number" id="p-days">
</div>

<button class="calc-btn" onclick="calcPrazo()">Calcular</button>
</div>

<div class="result" id="prazo-result"></div>
</div>

<!-- CONTAR -->
<div id="panel-contar" hidden>
<div class="field-row">
<div class="field">
<span class="field-label">Início</span>
<input type="date" id="c-start">
</div>

<div class="field">
<span class="field-label">Fim</span>
<input type="date" id="c-end">
</div>

<button class="calc-btn" onclick="calcContar()">Calcular</button>
</div>

<div class="result" id="contar-result"></div>
</div>

</div>
</div>

<script>
// mantém sua lógica original (sem alteração funcional)

function toISO(d){
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isDiaUtil(iso){
const d=new Date(iso+'T12:00:00').getDay();
return d!==0 && d!==6;
}

function fmtBR(iso){
const [y,m,d]=iso.split('-');
return `${d}/${m}/${y}`;
}

document.getElementById('tab-prazo').onclick=()=>{
document.getElementById('panel-prazo').hidden=false;
document.getElementById('panel-contar').hidden=true;
};

document.getElementById('tab-contar').onclick=()=>{
document.getElementById('panel-prazo').hidden=true;
document.getElementById('panel-contar').hidden=false;
};

function calcPrazo(){
const start=document.getElementById('p-start').value;
const dias=parseInt(document.getElementById('p-days').value,10);
const res=document.getElementById('prazo-result');

if(!start||!dias){
res.innerHTML='Preencha os campos';
res.classList.add('show');
return;
}

let d=new Date(start);
let count=0;

while(count<dias){
d.setDate(d.getDate()+1);
if(isDiaUtil(toISO(d))) count++;
}

res.innerHTML=`<strong>${fmtBR(toISO(d))}</strong>`;
res.classList.add('show');
}

function calcContar(){
const s=document.getElementById('c-start').value;
const e=document.getElementById('c-end').value;
const res=document.getElementById('contar-result');

if(!s||!e){
res.innerHTML='Preencha as datas';
res.classList.add('show');
return;
}

let d=new Date(s);
const end=new Date(e);
let count=0;

d.setDate(d.getDate()+1);
while(d<=end){
if(isDiaUtil(toISO(d))) count++;
d.setDate(d.getDate()+1);
}

res.innerHTML=`<strong>${count} dias úteis</strong>`;
res.classList.add('show');
}
</script>
</body>
</html>
