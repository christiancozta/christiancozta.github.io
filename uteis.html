<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>12-A, 9099/95</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --text:#373530;
  --muted:#787774;
  --muted-2:#9B9A97;
  --border:rgba(55,53,48,0.14);

  --title:20px;
  --tab:14px;
  --label:10px;
  --input:12px;
  --result:14px;
  --sub:10px;

  --radius:6px;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:Helvetica, Arial, sans-serif;
  color:var(--text);
}

.container{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.widget{
  width:100%;
  height:100%;
  padding:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  position:relative;
}

.title{
  font-family:'Inter';
  font-size:var(--title);
  font-weight:800;
}

.tabs{
  display:flex;
}

.tab{
  font-size:var(--tab);
  padding:8px 14px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
}

.tab:first-child{border-radius:6px 0 0 6px;}
.tab:last-child{border-radius:0 6px 6px 0;margin-left:-1px;}

.tab.active{
  background:#373530;
  color:white;
}

.field-row{
  display:flex;
  gap:14px;
  align-items:flex-end;
  justify-content:center;
}

.widget--vertical .field-row{
  flex-direction:column;
  align-items:center;
}

.widget--center .field-row{
  justify-content:center;
}

.field{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.field-label{
  font-size:var(--label);
  color:var(--muted-2);
}

input{
  height:38px;
  padding:0 10px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  font-size:var(--input);
}

.calc-btn{
  height:38px;
  padding:0 14px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
  font-size:var(--input);
}

.result{
  display:none;
  font-size:var(--result);
  border-left:2px solid #373530;
  padding:8px 10px;
  width:100%;
  max-width:420px;
}

.result.show{display:block;}

.sub{
  display:block;
  font-size:var(--sub);
  color:var(--muted);
}

/* BOTÃO DISCRETO */
.layout-switch{
  position:absolute;
  right:12px;
  bottom:12px;
  display:flex;
  gap:4px;
  padding:4px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:999px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(6px);
}

.layout-btn{
  width:24px;
  height:24px;
  border:none;
  background:transparent;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  opacity:0.6;
}

.layout-btn.active{
  background:rgba(0,0,0,0.1);
  opacity:1;
}

.dots{
  display:flex;
}

.dots span{
  width:4px;
  height:4px;
  background:currentColor;
  border-radius:50%;
}

.dots--row{gap:3px;}
.dots--column{flex-direction:column;gap:3px;}
.dots--center{justify-content:center;}
</style>
</head>

<body>
<div class="container">
<div class="widget widget--horizontal" id="widget">

<div class="title">12-A, 9099-95</div>

<div class="tabs">
<button class="tab active" id="tab-prazo">Calcular prazo</button>
<button class="tab" id="tab-contar">Contar dias</button>
</div>

<div id="panel-prazo">
<div class="field-row">
<div class="field">
<span class="field-label">Início</span>
<input type="date" id="p-start">
</div>

<div class="field">
<span class="field-label">Dias úteis</span>
<input type="number" id="p-days" placeholder="ex: 15">
</div>

<button class="calc-btn" onclick="calcPrazo()">Calcular</button>
</div>

<div class="result" id="prazo-result"></div>
</div>

<div id="panel-contar" hidden>
<div class="field-row">
<div class="field">
<span class="field-label">Início</span>
<input type="date" id="c-start">
</div>

<div class="field">
<span class="field-label">Fim</span>
<input type="date" id="c-end">
</div>

<button class="calc-btn" onclick="calcContar()">Calcular</button>
</div>

<div class="result" id="contar-result"></div>
</div>

<!-- BOTÃO NOVO -->
<div class="layout-switch">
<button class="layout-btn active" onclick="setLayout('horizontal')">
<div class="dots dots--row"><span></span><span></span><span></span></div>
</button>

<button class="layout-btn" onclick="setLayout('center')">
<div class="dots dots--center"><span></span></div>
</button>

<button class="layout-btn" onclick="setLayout('vertical')">
<div class="dots dots--column"><span></span><span></span><span></span></div>
</button>
</div>

</div>
</div>

<script>
function setLayout(mode){
  const w=document.getElementById('widget');
  w.classList.remove('widget--horizontal','widget--vertical','widget--center');

  if(mode==='horizontal') w.classList.add('widget--horizontal');
  if(mode==='vertical') w.classList.add('widget--vertical');
  if(mode==='center') w.classList.add('widget--center');

  document.querySelectorAll('.layout-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

/* restante do JS mantido igual */
</script>

</body>
</html>
